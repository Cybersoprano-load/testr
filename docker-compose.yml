# Весь стенд для задания: Kafka+Zookeeper, PostgreSQL, заглушка, мониторинг (Grafana +
# Prometheus + InfluxDB + экспортеры) и web-просмотрщик Kafka.
#
# Порты на хосте: см. README.md / REPORT.md (карта сервисов).

services:

  # ---------------- Kafka + Zookeeper (п.1.1) ----------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      # Проверяем, что порт Zookeeper открыт (bash есть в образе Confluent).
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/2181'"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      # Внешний listener для клиентов с хоста (JMeter, DBeaver и т.п.).
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Два listener'а: INTERNAL — для контейнеров в сети compose, EXTERNAL — для хоста.
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      # Топик создаём явно (см. kafka-init), а не автоматически.
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 15

  # Одноразовый контейнер: создаёт топик и завершается (п.1.1 «создать топик»).
  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["bash", "-c"]
    command:
      - |
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
          --topic ${KAFKA_TOPIC} --partitions ${KAFKA_PARTITIONS} --replication-factor 1
        echo "----- topic '${KAFKA_TOPIC}' ready -----"
        kafka-topics --bootstrap-server kafka:29092 --describe --topic ${KAFKA_TOPIC}
    restart: "no"

  # Web-просмотр очереди Kafka (альтернатива desktop Kafka Tool).
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      DYNAMIC_CONFIG_ENABLED: "true"

  # ---------------- PostgreSQL (п.1.1) ----------------
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      # init.sql выполняется один раз при первом старте — создаёт таблицу messages.
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---------------- Заглушка (п.1.3) ----------------
  stub:
    build: ./stub
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC: ${KAFKA_TOPIC}
      KAFKA_GROUP_ID: kafka-stub
      KAFKA_CONCURRENCY: ${KAFKA_CONCURRENCY}
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      STUB_DELAY_MS: ${STUB_DELAY_MS}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  # ---------------- Мониторинг (п.2) ----------------
  # Экспортер метрик PostgreSQL для Prometheus.
  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
    ports:
      - "9187:9187"

  # Экспортер метрик Kafka (offset'ы, consumer lag).
  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    depends_on:
      kafka:
        condition: service_healthy
    command: ["--kafka.server=kafka:29092"]
    ports:
      - "9308:9308"

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  # InfluxDB 1.8 — приёмник метрик JMeter (формат line protocol).
  influxdb:
    image: influxdb:1.8
    environment:
      INFLUXDB_DB: jmeter
      INFLUXDB_HTTP_AUTH_ENABLED: "false"
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb

  grafana:
    image: grafana/grafana:latest
    depends_on:
      - prometheus
      - influxdb
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      # provisioning = датасорсы + дашборды, создаются автоматически при старте.
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana

volumes:
  pgdata:
  grafana-data:
  influxdb-data:
