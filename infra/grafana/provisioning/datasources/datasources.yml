# Источники данных Grafana создаются автоматически при старте контейнера.
apiVersion: 1

datasources:
  # Prometheus - метрики JVM, PostgreSQL и Kafka
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true

  # InfluxDB — метрики JMeter (их шлёт Backend Listener из теста).
  - name: InfluxDB
    type: influxdb
    uid: influxdb
    access: proxy
    url: http://influxdb:8086
    database: jmeter
